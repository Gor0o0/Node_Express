<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="main">
        <div id="input-container">
             <input type="text" id="input-login" class="input-auth" placeholder="login">
            <input type="text" id="input-pass" class="input-auth" placeholder="password">
        </div>
       
        <div id="btn-container"></div>
            <button onclick="singUp()" id="btn-up" class="btn-success">Sing up</button>
            <button onclick="singIn()" id="btn-in" class="btn-success">Log in</button>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
